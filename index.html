<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>欧卡2 · 全球组合地图</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ===== 全局重置与基础样式 ===== */
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body { 
            height:100%; 
            overflow:hidden;
        }
        body { 
            background:#0a1219; 
            font-family:'Inter','Segoe UI',system-ui,sans-serif; 
            font-size:17px;
            line-height:1.5;
        }
        .app-wrapper { 
            display:flex; 
            flex-direction:column; 
            height:100vh;
            overflow:hidden;
        }
        
        /* ===== 顶部标题栏 ===== */
        .global-header {
            background:linear-gradient(135deg,rgba(0,0,0,0.7),rgba(10,25,35,0.9));
            border-bottom:2px solid rgba(255,200,100,0.4);
            padding:14px 40px;
            display:flex;
            flex-wrap:wrap;
            align-items:center;
            justify-content:center;
            gap:12px 30px;
            flex-shrink:0;
            backdrop-filter:blur(6px);
            position:relative;
            z-index:50;
            min-height:76px;
        }
        .global-header .brand-area {
            display:flex;
            flex-direction:column;
            align-items:center;
            gap:2px;
            text-align:center;
        }
        .global-header .brand-area .main-title {
            font-size:1.8rem;
            font-weight:800;
            background:linear-gradient(135deg,#FFE6A0 0%,#FFC857 100%);
            -webkit-background-clip:text;
            background-clip:text;
            color:transparent;
            text-shadow:0 2px 10px rgba(255,200,50,0.4);
            display:flex;
            align-items:center;
            gap:10px;
            line-height:1.2;
        }
        .global-header .brand-area .main-title i {
            color:#ffbc3c;
            font-size:1.8rem;
            text-shadow:0 0 6px #ffb347;
        }
        .global-header .brand-area .subtitle-row {
            display:flex;
            flex-wrap:wrap;
            align-items:center;
            justify-content:center;
            gap:8px 16px;
        }
        .global-header .brand-area .subtitle-row .author-badge,
        .global-header .brand-area .subtitle-row .date-badge {
            background:linear-gradient(120deg,#0f2f46,#07212e);
            padding:4px 16px;
            border-radius:48px;
            font-size:0.85rem;
            font-weight:700;
            backdrop-filter:blur(2px);
            display:flex;
            align-items:center;
            gap:6px;
        }
        .global-header .brand-area .subtitle-row .author-badge { color:#9bc5ff; border:1px solid #3a86ff; }
        .global-header .brand-area .subtitle-row .date-badge { color:#b3ffcf; border:1px solid #2dc653; }
        .global-header .header-controls {
            display:flex;
            align-items:center;
            gap:10px;
            flex-wrap:wrap;
            flex-shrink:0;
        }
        .global-header .header-controls .lang-dropdown-wrapper,
        .global-header .header-controls .version-dropdown-wrapper {
            position:relative;
            display:inline-block;
        }
        .global-header .header-controls .lang-dropdown-btn,
        .global-header .header-controls .version-dropdown-btn {
            background:rgba(0,0,0,0.5);
            border:1px solid rgba(255,200,100,0.4);
            border-radius:30px;
            padding:6px 18px 6px 16px;
            color:#ffdf9e;
            font-size:0.9rem;
            font-weight:700;
            cursor:pointer;
            display:flex;
            align-items:center;
            gap:6px;
            transition:all 0.2s;
            font-family:inherit;
            height:38px;
            min-width:76px;
        }
        .global-header .header-controls .lang-dropdown-btn:hover,
        .global-header .header-controls .version-dropdown-btn:hover {
            background:rgba(255,200,100,0.15);
            border-color:#ffcf7a;
        }
        .global-header .header-controls .lang-dropdown-btn i,
        .global-header .header-controls .version-dropdown-btn i {
            font-size:0.7rem;
            transition:transform 0.25s;
            color:#ffcf7a;
        }
        .global-header .header-controls .lang-dropdown-btn.open i,
        .global-header .header-controls .version-dropdown-btn.open i {
            transform:rotate(180deg);
        }
        .global-header .header-controls .lang-dropdown-menu,
        .global-header .header-controls .version-dropdown-menu {
            position:absolute;
            top:calc(100% + 4px);
            right:0;
            background:rgba(10,25,35,0.96);
            backdrop-filter:blur(12px);
            border:1px solid rgba(255,200,100,0.3);
            border-radius:14px;
            padding:4px 0;
            min-width:100px;
            box-shadow:0 12px 40px rgba(0,0,0,0.6);
            display:none;
            z-index:200;
            overflow:hidden;
        }
        .global-header .header-controls .lang-dropdown-menu.open,
        .global-header .header-controls .version-dropdown-menu.open {
            display:block;
            animation:dropdownFade 0.2s ease;
        }
        @keyframes dropdownFade { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:translateY(0); } }
        .global-header .header-controls .lang-dropdown-menu .lang-opt,
        .global-header .header-controls .version-dropdown-menu .version-opt {
            display:block;
            width:100%;
            padding:8px 18px;
            background:transparent;
            border:none;
            color:#cde5ea;
            font-size:0.85rem;
            font-weight:600;
            text-align:left;
            cursor:pointer;
            transition:all 0.15s;
            font-family:inherit;
        }
        .global-header .header-controls .lang-dropdown-menu .lang-opt:hover,
        .global-header .header-controls .version-dropdown-menu .version-opt:hover {
            background:rgba(255,200,100,0.1);
            color:#ffcf7a;
        }
        .global-header .header-controls .lang-dropdown-menu .lang-opt.active-opt,
        .global-header .header-controls .version-dropdown-menu .version-opt.active-opt {
            background:rgba(230,160,23,0.2);
            color:#ffdf9e;
            font-weight:700;
        }
        .global-header .header-controls .lang-dropdown-menu .lang-opt.active-opt::after,
        .global-header .header-controls .version-dropdown-menu .version-opt.active-opt::after {
            content:" ✓";
            color:#4cd964;
        }
        .global-header .header-controls .version-dropdown-menu .version-opt .opt-badge {
            float:right;
            font-size:0.6rem;
            background:rgba(45,198,83,0.2);
            color:#8affaa;
            padding:1px 8px;
            border-radius:20px;
            margin-left:8px;
        }

        /* ===== 主体：侧边栏 + 内容区 ===== */
        .app-body {
            display:flex;
            flex:1;
            min-height:0;
            overflow:hidden;
        }

        /* ===== 侧边栏 ===== */
        .sidebar-nav {
            width:380px;
            background:rgba(0,0,0,0.55);
            backdrop-filter:blur(10px);
            border-right:1px solid rgba(255,215,0,0.25);
            overflow-y:auto;
            overflow-x:hidden;
            scrollbar-width:thin;
            display:flex;
            flex-direction:column;
            flex-shrink:0;
            padding:16px 22px 24px 22px;
            height:100%;
        }
        .sidebar-nav::-webkit-scrollbar { width:4px; }
        .sidebar-nav::-webkit-scrollbar-track { background:#14262c; border-radius:10px; }
        .sidebar-nav::-webkit-scrollbar-thumb { background:#f5b042; border-radius:10px; }
        
        .nav-menu { display:flex; flex-direction:column; gap:10px; }
        .nav-menu-bottom { padding-top:16px; border-top:1px solid rgba(255,200,100,0.15); margin-top:8px; }
        
        .nav-item,
        .changelog-toggle-btn {
            background:rgba(25,50,58,0.6);
            border:1px solid rgba(255,200,100,0.25);
            padding:14px 20px;
            border-radius:44px;
            font-size:1rem;
            font-weight:600;
            color:#eef3f5;
            display:flex;
            align-items:center;
            gap:16px;
            cursor:pointer;
            transition:all 0.25s;
            width:100%;
            text-align:left;
            font-family:inherit;
            backdrop-filter:blur(2px);
            min-height:56px;
            line-height:1.3;
        }
        .nav-item i,
        .changelog-toggle-btn i {
            width:28px;
            font-size:1.2rem;
            color:#ffcf7a;
            flex-shrink:0;
            text-align:center;
        }
        .nav-item:hover,
        .changelog-toggle-btn:hover {
            background:#2f626e;
            transform:translateX(4px);
            border-color:#ffcd7e;
        }
        .nav-item.active {
            background:#e6a017;
            color:#121f23;
            border-color:#ffeaaf;
        }
        .nav-item.active i { color:#262216; }
        .nav-item.download-btn {
            background:linear-gradient(135deg,#1f5e4a,#0f3e30);
            border-color:#4cd964;
        }
        .nav-item.download-btn i { color:#4cd964; }
        .nav-stats-badge {
            background:rgba(45,198,83,0.2);
            border:1px solid rgba(45,198,83,0.5);
            border-radius:30px;
            padding:2px 12px;
            font-size:0.75rem;
            font-weight:700;
            color:#8affaa;
            margin-left:auto;
            white-space:nowrap;
            flex-shrink:0;
        }
        .nav-item.active .nav-stats-badge {
            background:rgba(18,30,18,0.6);
            border-color:#0a1a12;
            color:#0a1a12;
        }
        
        /* ===== 侧边栏内更新日志 ===== */
        .changelog-sidebar-wrapper {
            margin-bottom:4px;
            flex-shrink:0;
        }
        .changelog-toggle-btn .toggle-arrow {
            margin-left:auto;
            transition:transform 0.3s ease;
            flex-shrink:0;
        }
        .changelog-toggle-btn.open .toggle-arrow {
            transform:rotate(180deg);
        }
        .changelog-sidebar-content {
            max-height:0;
            overflow:hidden;
            transition:max-height 0.4s ease, opacity 0.3s ease, margin 0.3s ease;
            opacity:0;
            margin-top:0;
        }
        .changelog-sidebar-content.open {
            max-height:600px;
            opacity:1;
            margin-top:10px;
            overflow-y:auto;
        }
        .changelog-sidebar-content::-webkit-scrollbar { width:4px; }
        .changelog-sidebar-content::-webkit-scrollbar-track { background:#14262c; border-radius:10px; }
        .changelog-sidebar-content::-webkit-scrollbar-thumb { background:#f5b042; border-radius:10px; }
        .changelog-sidebar-inner {
            background:rgba(10,25,35,0.7);
            border-radius:16px;
            padding:16px 18px;
            border:1px solid rgba(255,200,100,0.12);
        }
        .changelog-sidebar-inner .changelog-version-title-sm {
            font-size:1rem;
            font-weight:700;
            color:#FFE6A0;
            margin-bottom:12px;
            display:flex;
            align-items:center;
            gap:10px;
            flex-wrap:wrap;
        }
        .changelog-sidebar-inner .changelog-version-title-sm .date-sm {
            font-size:0.75rem;
            color:#9bb7bf;
            background:rgba(0,0,0,0.3);
            padding:2px 12px;
            border-radius:20px;
            font-weight:400;
        }
        .changelog-sidebar-inner .cl-cat { margin-bottom:8px; }
        .changelog-sidebar-inner .cl-cat-header {
            font-size:0.9rem;
            font-weight:700;
            padding:6px 0 6px 8px;
            display:flex;
            align-items:center;
            gap:8px;
            cursor:pointer;
            user-select:none;
            border-radius:8px;
            transition:background 0.15s;
        }
        .changelog-sidebar-inner .cl-cat-header:hover { background:rgba(255,255,255,0.06); }
        .changelog-sidebar-inner .cl-cat-header .cl-toggle {
            margin-left:auto;
            transition:transform 0.2s;
            font-size:0.7rem;
        }
        .changelog-sidebar-inner .cl-cat-header.collapsed .cl-toggle { transform:rotate(-90deg); }
        .changelog-sidebar-inner .cl-cat-items {
            overflow:hidden;
            max-height:400px;
            transition:max-height 0.25s ease, opacity 0.2s ease;
            opacity:1;
        }
        .changelog-sidebar-inner .cl-cat-items.collapsed {
            max-height:0;
            opacity:0;
        }
        .changelog-sidebar-inner .cl-item {
            font-size:0.9rem;
            color:#d4e8ed;
            padding:4px 0 4px 18px;
            border-left:2px solid rgba(255,200,100,0.15);
            margin-left:8px;
            padding-left:16px;
            margin-bottom:3px;
            line-height:1.5;
            cursor:pointer;
            transition:color 0.2s, background 0.15s;
            border-radius:4px;
        }
        .changelog-sidebar-inner .cl-item:hover {
            color:#ffcf7a;
            background:rgba(255,200,100,0.06);
        }
        .changelog-sidebar-inner .cl-item .cl-file {
            font-size:0.75rem;
            color:#8aa8b0;
            font-family:monospace;
            display:block;
            margin-top:2px;
            cursor:default;
        }
        .changelog-sidebar-inner .cl-item .cl-file:hover {
            color:#8aa8b0;
            background:transparent;
        }
        .changelog-sidebar-inner .cl-cat-header.cat-new { color:#8affaa; }
        .changelog-sidebar-inner .cl-cat-header.cat-updated { color:#8bbfff; }
        .changelog-sidebar-inner .cl-cat-header.cat-moved { color:#ffdf7e; }
        .changelog-sidebar-inner .cl-cat-header.cat-deleted { color:#ff8a9e; }
        .changelog-sidebar-inner .cl-empty { 
            color:#6a8a92; 
            font-size:0.85rem; 
            padding:6px 14px; 
            font-style:italic; 
        }

        /* ===== 主内容区 ===== */
        .content-main {
            flex:1;
            min-width:0;
            background:rgba(8,20,24,0.25);
            padding:20px 36px 36px 36px;
            overflow-y:auto;
            overflow-x:hidden;
            height:100%;
        }
        .content-main::-webkit-scrollbar { width:6px; }
        .content-main::-webkit-scrollbar-track { background:#14262c; border-radius:10px; }
        .content-main::-webkit-scrollbar-thumb { background:#f5b042; border-radius:10px; }
        
        .content-main .content-header {
            display:flex;
            align-items:center;
            justify-content:space-between;
            flex-wrap:wrap;
            gap:12px;
            padding-bottom:14px;
            border-bottom:1px solid rgba(255,200,100,0.2);
            margin-bottom:24px;
            flex-shrink:0;
        }
        .content-main .content-header h2 {
            font-size:1.6rem;
            font-weight:700;
            background:linear-gradient(135deg,#ffde9e,#ffc057);
            -webkit-background-clip:text;
            background-clip:text;
            color:transparent;
            display:flex;
            align-items:center;
            gap:14px;
        }
        .content-main .content-header h2 i {
            color:#ffbc3c;
            font-size:1.5rem;
        }
        .content-main .dynamic-area {
            min-height:300px;
            width:100%;
        }
        .content-main footer {
            text-align:center;
            font-size:0.8rem;
            padding:20px 0 8px 0;
            color:#bdd7df;
            border-top:1px solid rgba(255,200,100,0.15);
            margin-top:20px;
            line-height:1.6;
            flex-shrink:0;
        }

        /* ===== 筛选栏 ===== */
        .filter-bar { background:rgba(16,34,40,0.85); border-radius:60px; padding:8px 16px; margin-bottom:28px; display:flex; flex-wrap:wrap; align-items:center; gap:12px; backdrop-filter:blur(4px); border:1px solid rgba(255,200,100,0.3); }
        .filter-label { display:flex; align-items:center; gap:8px; font-size:0.9rem; font-weight:600; color:#ffdf9e; background:rgba(0,0,0,0.4); padding:6px 18px; border-radius:40px; }
        .filter-buttons { display:flex; flex-wrap:wrap; gap:8px; }
        .filter-chip { background:rgba(0,0,0,0.5); border:1px solid rgba(255,200,100,0.35); color:#cde5ea; padding:6px 18px; border-radius:40px; font-size:0.8rem; font-weight:600; cursor:pointer; transition:all 0.2s; display:inline-flex; align-items:center; gap:8px; }
        .filter-chip i { font-size:0.75rem; }
        .filter-chip.active { background:#e6a017; color:#121f23; border-color:#ffeaaf; }
        .filter-chip.active i { color:#121f23; }
        .filter-chip:hover:not(.active):not(.filter-zero) { background:#2f626e; transform:translateY(-1px); }
        .filter-chip.filter-zero { opacity:0.5; cursor:default; }
        .filter-chip.filter-zero:hover { background:rgba(0,0,0,0.5); transform:none; }
        .filter-count { background:rgba(0,0,0,0.5); border-radius:30px; padding:1px 10px; font-size:0.7rem; margin-left:6px; }

        /* ===== 模组卡片 ===== */
        .mods-grid { display:flex; flex-direction:column; gap:18px; width:100%; }
        
        /* ===== 🟢 模组卡片荧光效果（放在前面确保优先级） ===== */
        /* 新增 - 绿色荧光 */
        .mod-card.status-new {
            border-left-color:#2dc653;
            animation: glowGreen 2.5s ease-in-out infinite;
            box-shadow: 0 0 20px rgba(45, 198, 83, 0.25), 0 4px 12px rgba(0,0,0,0.3);
            position: relative;
            z-index: 1;
        }
        @keyframes glowGreen {
            0%, 100% { box-shadow: 0 0 20px rgba(45, 198, 83, 0.2), 0 0 40px rgba(45, 198, 83, 0.05), 0 4px 12px rgba(0,0,0,0.3); }
            50% { box-shadow: 0 0 35px rgba(45, 198, 83, 0.6), 0 0 70px rgba(45, 198, 83, 0.2), 0 4px 12px rgba(0,0,0,0.3); }
        }

        /* 更新 - 蓝色荧光 */
        .mod-card.status-updated {
            border-left-color:#3a86ff;
            animation: glowBlue 2.5s ease-in-out infinite;
            box-shadow: 0 0 20px rgba(58, 134, 255, 0.25), 0 4px 12px rgba(0,0,0,0.3);
            position: relative;
            z-index: 1;
        }
        @keyframes glowBlue {
            0%, 100% { box-shadow: 0 0 20px rgba(58, 134, 255, 0.2), 0 0 40px rgba(58, 134, 255, 0.05), 0 4px 12px rgba(0,0,0,0.3); }
            50% { box-shadow: 0 0 35px rgba(58, 134, 255, 0.6), 0 0 70px rgba(58, 134, 255, 0.2), 0 4px 12px rgba(0,0,0,0.3); }
        }

        /* 移动 - 黄色荧光 */
        .mod-card.status-moved {
            border-left-color:#ffbc3c;
            animation: glowYellow 2.5s ease-in-out infinite;
            box-shadow: 0 0 20px rgba(255, 188, 60, 0.25), 0 4px 12px rgba(0,0,0,0.3);
            position: relative;
            z-index: 1;
        }
        @keyframes glowYellow {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 188, 60, 0.2), 0 0 40px rgba(255, 188, 60, 0.05), 0 4px 12px rgba(0,0,0,0.3); }
            50% { box-shadow: 0 0 35px rgba(255, 188, 60, 0.6), 0 0 70px rgba(255, 188, 60, 0.2), 0 4px 12px rgba(0,0,0,0.3); }
        }

        /* 删除 - 红色荧光 */
        .mod-card.status-deleted {
            border-left-color:#dc3545;
            animation: glowRed 2.5s ease-in-out infinite;
            box-shadow: 0 0 20px rgba(220, 53, 69, 0.25), 0 4px 12px rgba(0,0,0,0.3);
            position: relative;
            z-index: 1;
            background:rgba(30,30,40,0.7);
        }
        @keyframes glowRed {
            0%, 100% { box-shadow: 0 0 20px rgba(220, 53, 69, 0.2), 0 0 40px rgba(220, 53, 69, 0.05), 0 4px 12px rgba(0,0,0,0.3); }
            50% { box-shadow: 0 0 35px rgba(220, 53, 69, 0.6), 0 0 70px rgba(220, 53, 69, 0.2), 0 4px 12px rgba(0,0,0,0.3); }
        }

        /* 暂停动画 - hover时暂停，提升交互体验 */
        .mod-card.status-new:hover,
        .mod-card.status-updated:hover,
        .mod-card.status-moved:hover,
        .mod-card.status-deleted:hover {
            animation-play-state: paused;
        }

        /* 普通状态 - 无荧光，但保留基础样式 */
        .mod-card.status-normal {
            border-left-color:#5a6e78;
            background:linear-gradient(135deg,rgba(18,38,44,0.95),rgba(12,28,34,0.95));
        }

        /* 卡片基础样式（放在荧光之后，避免覆盖） */
        .mod-card {
            border-radius:24px;
            transition:all 0.25s ease;
            overflow:hidden;
            width:100%;
            background:linear-gradient(135deg,rgba(18,38,44,0.95),rgba(12,28,34,0.95));
        }
        .mod-card:hover {
            transform:translateX(4px);
            background:linear-gradient(135deg,rgba(28,48,54,0.95),rgba(18,34,40,0.95));
        }
        /* 删除状态hover不改变背景 */
        .mod-card.status-deleted:hover {
            background:rgba(30,30,40,0.7);
        }

        .mod-card-inner { padding:18px 24px; display:flex; flex-wrap:wrap; align-items:center; gap:16px; }

        /* ===== 模组图片 ===== */
        .mod-thumbnail {
            flex-shrink:0;
            width:276px;
            height:162px;
            border-radius:12px;
            overflow:hidden;
            background:rgba(0,0,0,0.4);
            border:1px solid rgba(255,200,100,0.15);
            display:flex;
            align-items:center;
            justify-content:center;
            position:relative;
            transition:all 0.3s ease;
        }
        .mod-thumbnail img {
            width:100%;
            height:100%;
            object-fit:cover;
            transition:transform 0.3s ease;
        }
        .mod-thumbnail img:hover {
            transform:scale(1.05);
        }
        .mod-thumbnail .no-image {
            color:#6a8a92;
            font-size:0.55rem;
            text-align:center;
            padding:4px;
            line-height:1.2;
        }
        .mod-thumbnail .no-image i {
            font-size:1.2rem;
            display:block;
            margin-bottom:2px;
            color:#4a6a72;
        }
