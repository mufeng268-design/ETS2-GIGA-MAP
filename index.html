<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>欧卡2 · 全球组合地图模组工具 | 版本切换</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ===== 全局重置与基础样式 ===== */
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#0a1219; font-family:'Inter','Segoe UI',system-ui,sans-serif; }
        .app-wrapper { display:flex; min-height:100vh; }
        
        /* ===== 侧边栏 ===== */
        .sidebar-nav { width:300px; background:rgba(0,0,0,0.6); backdrop-filter:blur(10px); border-right:1px solid rgba(255,215,0,0.3); position:fixed; top:0; left:0; bottom:0; overflow-y:auto; scrollbar-width:thin; display:flex; flex-direction:column; z-index:100; }
        .sidebar-nav::-webkit-scrollbar { width:5px; }
        .sidebar-nav::-webkit-scrollbar-track { background:#14262c; border-radius:10px; }
        .sidebar-nav::-webkit-scrollbar-thumb { background:#f5b042; border-radius:10px; }
        .nav-menu-container { flex:1; display:flex; flex-direction:column; justify-content:space-between; }
        .nav-menu { display:flex; flex-direction:column; gap:12px; padding:0 20px 20px 20px; }
        .nav-menu-bottom { padding:20px 20px 32px 20px; border-top:1px solid rgba(255,200,100,0.2); margin-top:10px; }
        .nav-item { background:rgba(25,50,58,0.6); border:1px solid rgba(255,200,100,0.25); padding:12px 20px; border-radius:44px; font-size:0.95rem; font-weight:600; color:#eef3f5; display:flex; align-items:center; gap:16px; cursor:pointer; transition:all 0.25s; width:100%; text-align:left; font-family:inherit; backdrop-filter:blur(2px); }
        .nav-item i { width:28px; font-size:1.2rem; color:#ffcf7a; }
        .nav-item:hover { background:#2f626e; transform:translateX(6px); border-color:#ffcd7e; }
        .nav-item.active { background:#e6a017; color:#121f23; border-color:#ffeaaf; }
        .nav-item.active i { color:#262216; }
        .nav-item.download-btn { background:linear-gradient(135deg,#1f5e4a,#0f3e30); border-color:#4cd964; }
        .nav-item.download-btn i { color:#4cd964; }
        .nav-stats-badge { background:rgba(45,198,83,0.2); border:1px solid rgba(45,198,83,0.5); border-radius:30px; padding:2px 10px; font-size:0.7rem; font-weight:700; color:#8affaa; margin-left:auto; white-space:nowrap; }
        .nav-item.active .nav-stats-badge { background:rgba(18,30,18,0.6); border-color:#0a1a12; color:#0a1a12; }
        .brand-area { padding:32px 24px 28px 24px; border-bottom:2px solid rgba(255,200,100,0.5); background:linear-gradient(135deg,rgba(255,215,0,0.08),rgba(255,140,0,0.02)); border-radius:0 0 32px 32px; }
        .main-title { font-size:1.9rem; font-weight:800; background:linear-gradient(135deg,#FFE6A0 0%,#FFC857 100%); -webkit-background-clip:text; background-clip:text; color:transparent; text-shadow:0 2px 10px rgba(255,200,50,0.4); display:flex; align-items:center; gap:10px; }
        .main-title i { background:none; color:#ffbc3c; font-size:2rem; text-shadow:0 0 6px #ffb347; }
        .subtitle-line { display:flex; flex-wrap:wrap; justify-content:space-between; margin-top:22px; gap:14px; align-items:center; }
        .author-badge, .date-badge { background:linear-gradient(120deg,#0f2f46,#07212e); padding:8px 18px; border-radius:48px; font-size:0.85rem; font-weight:700; backdrop-filter:blur(2px); }
        .author-badge { color:#9bc5ff; border:1px solid #3a86ff; }
        .date-badge { color:#b3ffcf; border:1px solid #2dc653; display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
        
        /* ===== 主内容区头部 ===== */
        .content-header { padding:32px 40px 16px 40px; border-bottom:1px solid rgba(255,200,100,0.3); display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:16px; }
        .content-header-left { display:flex; align-items:center; gap:16px; flex-wrap:wrap; }
        .content-header h2 { font-size:1.7rem; font-weight:700; background:linear-gradient(135deg,#ffde9e,#ffc057); -webkit-background-clip:text; background-clip:text; color:transparent; display:flex; align-items:center; gap:14px; }
        .header-controls { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
        
        /* ===== 语言下拉菜单 ===== */
        .lang-dropdown-wrapper { position:relative; display:inline-block; }
        .lang-dropdown-btn { background:rgba(0,0,0,0.5); border:1px solid rgba(255,200,100,0.4); border-radius:30px; padding:8px 22px 8px 18px; color:#ffdf9e; font-size:0.9rem; font-weight:700; cursor:pointer; display:flex; align-items:center; gap:10px; transition:all 0.2s; font-family:inherit; height:40px; min-width:88px; }
        .lang-dropdown-btn:hover { background:rgba(255,200,100,0.15); border-color:#ffcf7a; }
        .lang-dropdown-btn i { font-size:0.8rem; transition:transform 0.25s; color:#ffcf7a; }
        .lang-dropdown-btn.open i { transform:rotate(180deg); }
        .lang-dropdown-menu { position:absolute; top:calc(100% + 6px); right:0; background:rgba(10,25,35,0.96); backdrop-filter:blur(12px); border:1px solid rgba(255,200,100,0.3); border-radius:16px; padding:6px 0; min-width:110px; box-shadow:0 12px 40px rgba(0,0,0,0.6); display:none; z-index:200; overflow:hidden; }
        .lang-dropdown-menu.open { display:block; animation:dropdownFade 0.2s ease; }
        @keyframes dropdownFade { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }
        .lang-dropdown-menu .lang-opt { display:block; width:100%; padding:10px 22px; background:transparent; border:none; color:#cde5ea; font-size:0.9rem; font-weight:600; text-align:left; cursor:pointer; transition:all 0.15s; font-family:inherit; }
        .lang-dropdown-menu .lang-opt:hover { background:rgba(255,200,100,0.1); color:#ffcf7a; }
        .lang-dropdown-menu .lang-opt.active-opt { background:rgba(230,160,23,0.2); color:#ffdf9e; font-weight:700; }
        .lang-dropdown-menu .lang-opt.active-opt::after { content:" ✓"; color:#4cd964; }
        
        /* ===== 版本下拉菜单 ===== */
        .version-dropdown-wrapper { position:relative; display:inline-block; }
        .version-dropdown-btn { background:rgba(0,0,0,0.5); border:1px solid rgba(255,200,100,0.4); border-radius:30px; padding:8px 22px 8px 18px; color:#ffdf9e; font-size:0.9rem; font-weight:700; cursor:pointer; display:flex; align-items:center; gap:10px; transition:all 0.2s; font-family:inherit; height:40px; min-width:88px; }
        .version-dropdown-btn:hover { background:rgba(255,200,100,0.15); border-color:#ffcf7a; }
        .version-dropdown-btn i { font-size:0.8rem; transition:transform 0.25s; color:#ffcf7a; }
        .version-dropdown-btn.open i { transform:rotate(180deg); }
        .version-dropdown-menu { position:absolute; top:calc(100% + 6px); right:0; background:rgba(10,25,35,0.96); backdrop-filter:blur(12px); border:1px solid rgba(255,200,100,0.3); border-radius:16px; padding:6px 0; min-width:130px; box-shadow:0 12px 40px rgba(0,0,0,0.6); display:none; z-index:200; overflow:hidden; }
        .version-dropdown-menu.open { display:block; animation:dropdownFade 0.2s ease; }
        .version-dropdown-menu .version-opt { display:block; width:100%; padding:10px 22px; background:transparent; border:none; color:#cde5ea; font-size:0.9rem; font-weight:600; text-align:left; cursor:pointer; transition:all 0.15s; font-family:inherit; }
        .version-dropdown-menu .version-opt:hover { background:rgba(255,200,100,0.1); color:#ffcf7a; }
        .version-dropdown-menu .version-opt.active-opt { background:rgba(230,160,23,0.2); color:#ffdf9e; font-weight:700; }
        .version-dropdown-menu .version-opt.active-opt::after { content:" ✓"; color:#4cd964; }
        .version-dropdown-menu .version-opt .opt-badge { float:right; font-size:0.65rem; background:rgba(45,198,83,0.2); color:#8affaa; padding:1px 10px; border-radius:20px; margin-left:12px; }
        
        /* ===== 主内容区 ===== */
        .content-main { flex:1; margin-left:300px; background:rgba(8,20,24,0.3); min-height:100vh; }
        .dynamic-area { padding:20px 40px 40px 40px; }
        
        /* ===== 筛选栏 ===== */
        .filter-bar { background:rgba(16,34,40,0.85); border-radius:60px; padding:6px 12px; margin-bottom:28px; display:flex; flex-wrap:wrap; align-items:center; gap:12px; backdrop-filter:blur(4px); border:1px solid rgba(255,200,100,0.3); }
        .filter-label { display:flex; align-items:center; gap:8px; font-size:0.85rem; font-weight:600; color:#ffdf9e; background:rgba(0,0,0,0.4); padding:6px 16px; border-radius:40px; }
        .filter-buttons { display:flex; flex-wrap:wrap; gap:8px; }
        .filter-chip { background:rgba(0,0,0,0.5); border:1px solid rgba(255,200,100,0.35); color:#cde5ea; padding:6px 16px; border-radius:40px; font-size:0.75rem; font-weight:600; cursor:pointer; transition:all 0.2s; display:inline-flex; align-items:center; gap:8px; }
        .filter-chip i { font-size:0.7rem; }
        .filter-chip.active { background:#e6a017; color:#121f23; border-color:#ffeaaf; }
        .filter-chip.active i { color:#121f23; }
        .filter-chip:hover:not(.active):not(.filter-zero) { background:#2f626e; transform:translateY(-1px); }
        .filter-chip.filter-zero { opacity:0.5; cursor:default; }
        .filter-chip.filter-zero:hover { background:rgba(0,0,0,0.5); transform:none; }
        .filter-count { background:rgba(0,0,0,0.5); border-radius:30px; padding:2px 8px; font-size:0.7rem; margin-left:6px; }
        
        /* ===== 模组卡片 ===== */
        .mods-grid { display:flex; flex-direction:column; gap:20px; }
        .mod-card { background:linear-gradient(135deg,rgba(18,38,44,0.95),rgba(12,28,34,0.95)); border-radius:28px; transition:all 0.25s ease; overflow:hidden; border-left:8px solid; box-shadow:0 6px 14px rgba(0,0,0,0.3); }
        .mod-card.status-new { border-left-color:#2dc653; }
        .mod-card.status-updated { border-left-color:#3a86ff; }
        .mod-card.status-moved { border-left-color:#ffbc3c; }
        .mod-card.status-deleted { border-left-color:#dc3545; background:rgba(30,30,40,0.7); }
        .mod-card.status-normal { border-left-color:#5a6e78; }
        .mod-card:hover { transform:translateX(6px); background:linear-gradient(135deg,rgba(28,48,54,0.95),rgba(18,34,40,0.95)); }
        .mod-card-inner { padding:20px 24px; display:flex; flex-wrap:wrap; align-items:center; gap:20px; }
        .mod-status-area { flex-shrink:0; width:100px; }
        .status-badge-large { display:inline-flex; align-items:center; gap:8px; padding:6px 16px; border-radius:40px; font-size:0.75rem; font-weight:700; backdrop-filter:blur(2px); }
        .status-new-large { background:rgba(45,198,83,0.2); color:#8affaa; border:1px solid rgba(45,198,83,0.5); }
        .status-updated-large { background:rgba(58,134,255,0.2); color:#8bbfff; border:1px solid rgba(58,134,255,0.5); }
        .status-moved-large { background:rgba(255,188,60,0.2); color:#ffdf7e; border:1px solid rgba(255,188,60,0.5); }
        .status-deleted-large { background:rgba(220,53,69,0.2); color:#ff8a9e; border:1px solid rgba(220,53,69,0.5); }
        .status-normal-large { background:rgba(90,110,120,0.3); color:#b8d0d8; border:1px solid rgba(90,110,120,0.5); }
        .mod-content-area { flex:2; min-width:200px; }
        .mod-header { display:flex; align-items:center; flex-wrap:wrap; gap:8px; }
        .mod-order { background:rgba(0,0,0,0.5); padding:4px 12px; border-radius:30px; font-size:0.7rem; font-weight:600; color:#ffdd99; }
        .mod-order.deleted-order { background:#333355; color:#888; }
        .mod-title { font-size:1.2rem; font-weight:700; color:#fef2da; cursor:pointer; transition:color 0.2s,text-shadow 0.2s; display:inline-block; }
        .mod-title:hover { color:#ffcf7a; text-shadow:0 0 4px rgba(255,200,100,0.5); text-decoration:underline; }
        .mod-card.status-deleted .mod-title { text-decoration:line-through; cursor:default; pointer-events:none; color:#9aaeb5; }
        .mod-file { font-size:0.7rem; color:#8aa8b0; background:rgba(0,0,0,0.3); padding:2px 12px; border-radius:20px; border:1px solid rgba(255,200,100,0.15); font-family:'Inter',monospace; display:inline-block; margin-top:4px; }
        .mod-card.status-deleted .mod-file { color:#6a7a7f; border-color:rgba(220,53,69,0.3); }
        .mod-file i { margin-right:4px; font-size:0.6rem; color:#4cd964; }
        .mod-card.status-deleted .mod-file i { color:#dc3545; }
        .mod-action-area { flex-shrink:0; display:flex; align-items:center; }
        .download-button { background:linear-gradient(135deg,#2dc653,#1a8f3a); border:none; padding:10px 22px; border-radius:44px; font-size:0.8rem; font-weight:700; color:#0a1a12; cursor:pointer; transition:all 0.2s; display:inline-flex; align-items:center; gap:10px; }
        .download-button.disabled { background:#555; cursor:not-allowed; opacity:0.6; }
        .download-button:not(.disabled):hover { transform:translateY(-2px); box-shadow:0 4px 12px rgba(45,198,83,0.4); }
        .no-mod-message { background:rgba(16,34,40,0.85); border-radius:36px; padding:48px 28px; text-align:center; border-left:6px solid #f5b042; color:#bcd7df; }
        .no-mod-message i { font-size:3rem; color:#ffcf7a; margin-bottom:16px; display:block; }
        .highlight-mod { animation:pulseHighlight 3s ease-in-out; box-shadow:0 0 0 4px #ffbc3c, 0 0 0 8px rgba(255,188,60,0.4); border-radius:28px; transition:box-shadow 0.2s; position:relative; z-index:10; }
        @keyframes pulseHighlight { 0%{box-shadow:0 0 0 0px #ffbc3c,0 0 0 0px rgba(255,188,60,0.6);background:rgba(255,188,60,0.05);}15%{box-shadow:0 0 0 6px #ffbc3c,0 0 0 12px rgba(255,188,60,0.3);background:rgba(255,188,60,0.12);}30%{box-shadow:0 0 0 3px #ffbc3c,0 0 0 6px rgba(255,188,60,0.2);background:rgba(255,188,60,0.08);}45%{box-shadow:0 0 0 6px #ffbc3c,0 0 0 12px rgba(255,188,60,0.3);background:rgba(255,188,60,0.12);}60%{box-shadow:0 0 0 2px #ffbc3c,0 0 0 5px rgba(255,188,60,0.15);background:rgba(255,188,60,0.05);}75%{box-shadow:0 0 0 5px #ffbc3c,0 0 0 10px rgba(255,188,60,0.25);background:rgba(255,188,60,0.1);}100%{box-shadow:0 0 0 0px #ffbc3c,0 0 0 0px rgba(255,188,60,0);background:transparent;} }
        
        /* ===== 更新日志 ===== */
        .changelog-wrapper { background:rgba(16,34,40,0.85); border-radius:36px; padding:28px 34px; border-left:6px solid #f5b042; }
        .changelog-version-header { margin-bottom:24px; padding-bottom:16px; border-bottom:2px solid rgba(255,200,100,0.3); }
        .changelog-version-title { font-size:1.5rem; font-weight:800; background:linear-gradient(135deg,#FFE6A0,#FFC857); -webkit-background-clip:text; background-clip:text; color:transparent; display:inline-flex; align-items:center; gap:12px; }
        .changelog-date { font-size:0.85rem; color:#9bb7bf; background:rgba(0,0,0,0.3); padding:4px 12px; border-radius:30px; }
        .changelog-categories { display:flex; flex-direction:column; gap:16px; }
        .changelog-category { background:rgba(0,0,0,0.25); border-radius:24px; overflow:hidden; }
        .category-header { padding:14px 22px; display:flex; align-items:center; gap:12px; font-weight:700; font-size:1rem; cursor:pointer; transition:background 0.2s; user-select:none; }
        .category-header:hover { background:rgba(255,255,255,0.05); }
        .category-header i:first-child { width:20px; }
        .toggle-icon-cat { margin-left:auto; transition:transform 0.2s; }
        .category-header.collapsed .toggle-icon-cat { transform:rotate(-90deg); }
        .category-items { padding:16px 22px; display:flex; flex-direction:column; gap:12px; }
        .category-items.collapsed { display:none; }
        .category-header.new { background:rgba(45,198,83,0.15); color:#8affaa; border-bottom:1px solid rgba(45,198,83,0.3); }
        .category-header.updated { background:rgba(58,134,255,0.15); color:#8bbfff; border-bottom:1px solid rgba(58,134,255,0.3); }
        .category-header.moved { background:rgba(255,188,60,0.15); color:#ffdf7e; border-bottom:1px solid rgba(255,188,60,0.3); }
        .category-header.deleted { background:rgba(220,53,69,0.15); color:#ff8a9e; border-bottom:1px solid rgba(220,53,69,0.3); }
        .changelog-mod-item { display:flex; flex-direction:column; gap:4px; padding:8px 12px; background:rgba(0,0,0,0.2); border-radius:20px; transition:all 0.2s; }
        .changelog-mod-item:hover { background:rgba(0,0,0,0.4); }
        .changelog-mod-name { font-size:0.95rem; font-weight:600; color:#fef2da; }
        .changelog-mod-file { font-size:0.7rem; color:#8aa8b0; font-family:'Inter',monospace; display:flex; align-items:center; gap:6px; }
        .changelog-mod-file i { font-size:0.6rem; color:#4cd964; }
        .category-header.deleted .changelog-mod-file i { color:#dc3545; }
        .changelog-note { margin-top:24px; padding:14px 20px; background:rgba(230,160,23,0.1); border-radius:20px; border-left:3px solid #e6a017; color:#FFE3B0; font-size:0.85rem; }
        
        /* ===== 信息卡片 ===== */
        .info-card { background:rgba(16,34,40,0.85); border-radius:36px; padding:28px 34px; border-left:6px solid #f5b042; }
        .guide-title { color:#ffcf7a; font-size:1.2rem; margin-bottom:16px; }
        .step-list { list-style:none; }
        .step-list li { display:flex; align-items:flex-start; gap:14px; margin-bottom:16px; color:#E0ECF0; }
        .step-number { width:32px; height:32px; background:rgba(230,160,23,0.2); border-radius:40px; display:flex; align-items:center; justify-content:center; font-weight:800; color:#ffcf7a; }
        .optimize-card { background:rgba(0,0,0,0.25); border-radius:24px; padding:18px 22px; margin-bottom:16px; }
        .priority-item { background:rgba(0,0,0,0.35); border-radius:20px; padding:16px 22px; display:flex; align-items:center; flex-wrap:wrap; gap:18px; border-left:4px solid #ffbc4a; margin-bottom:12px; }
        .priority-badge { background:#e6a017; color:#121f23; padding:5px 16px; border-radius:30px; font-size:0.8rem; font-weight:800; }
        .version-accordion { margin-bottom:16px; border-radius:20px; background:rgba(0,0,0,0.3); border:1px solid rgba(255,200,100,0.25); }
        .accordion-header { background:linear-gradient(135deg,#1a3a3a,#0e2a2a); padding:18px 24px; cursor:pointer; display:flex; justify-content:space-between; }
        .accordion-title { font-size:1.3rem; font-weight:700; color:#FFE6B3; display:flex; align-items:center; gap:12px; }
        .toggle-icon { color:#ffcf7a; transition:transform 0.2s; }
        .accordion-header.expanded .toggle-icon { transform:rotate(180deg); }
        .accordion-content { display:none; padding:20px 24px; background:rgba(0,0,0,0.3); border-top:1px solid rgba(255,200,100,0.15); }
        .accordion-content.show { display:block; }
        .sub-version-grid { display:flex; flex-wrap:wrap; gap:16px; }
        .sub-version-card { background:rgba(20,45,50,0.7); border-radius:20px; padding:16px 20px; min-width:160px; border:1px solid rgba(255,200,100,0.3); }
        .download-btn-sm { background:linear-gradient(135deg,#2dc653,#1a8f3a); padding:6px 16px; border-radius:30px; font-size:0.75rem; font-weight:700; color:#0a1a12; cursor:pointer; display:inline-block; border:none; font-family:inherit; transition:0.2s; }
        .download-btn-sm:hover { transform:translateY(-2px); filter:brightness(1.05); }
        .save-path { background:rgba(0,0,0,0.4); padding:16px 20px; border-radius:20px; margin-top:24px; }
        .feature-highlight { background:rgba(230,160,23,0.15); border-radius:20px; padding:14px 20px; margin-top:20px; border-left:3px solid #e6a017; color:#FEF7E0; }
        
        /* ===== 安装指南 ===== */
        .install-guide { display:flex; flex-direction:column; gap:24px; }
        .install-step { background:rgba(0,0,0,0.3); border-radius:28px; padding:24px 28px; border-left:6px solid #f5b042; transition:background 0.2s; }
        .install-step:hover { background:rgba(0,0,0,0.45); }
        .install-step-header { display:flex; align-items:center; gap:16px; margin-bottom:12px; }
        .install-step-number { background:#e6a017; color:#121f23; font-weight:800; font-size:1.2rem; width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
        .install-step-title { font-size:1.2rem; font-weight:700; color:#ffdf9e; }
        .install-step-content { color:#d4e8ed; font-size:0.95rem; line-height:1.6; padding-left:56px; }
        .install-step-content .highlight { color:#FFD966 !important; font-weight:700; }
        .install-step-content code { background:rgba(0,0,0,0.4); padding:2px 10px; border-radius:8px; font-family:'Inter',monospace; color:#ffcf7a; font-size:0.85rem; }
        
        /* ===== 优化设置 ===== */
        .optimize-wrapper { overflow-x:auto; }
        .optimize-table { width:100%; border-collapse:collapse; background:rgba(0,0,0,0.3); border-radius:20px; overflow:hidden; margin-top:16px; }

        .othermods-list .mod-order-item.bottom-label::before { background:linear-gradient(135deg,rgba(220,53,69,0.4),rgba(220,53,69,0.1),rgba(220,53,69,0.4)); }

        .othermods-list .mod-order-item.highlight-item::before { background:linear-gradient(135deg,rgba(255,200,100,0.5),rgba(255,200,100,0.1),rgba(255,200,100,0.5)); opacity:0.8; }

        @media (max-width:700px){ .sidebar-nav{ transform:translateX(-100%); transition:transform 0.3s ease; z-index:100; } .sidebar-nav.mobile-open{ transform:translateX(0); } .content-main{ margin-left:0; } .filter-bar{ border-radius:28px; padding:8px 12px; } .install-step{ padding:18px 20px; } .install-step-number{ width:34px; height:34px; font-size:1rem; } .othermods-list .mod-order-item{ padding:10px 14px; font-size:0.85rem; border-radius:12px; } .othermods-list{ max-width:340px; } .othermods-wrapper{ min-height:50vh; } .content-header{ flex-direction:column; align-items:flex-start; } }

<body>
<div class="app-wrapper">
    <!-- ===== 侧边栏 ===== -->
    <div class="sidebar-nav" id="sidebarNav">
        <div class="brand-area">
            <div class="main-title"><i class="fas fa-globe-americas"></i> <span data-i18n="brand_title">欧洲卡车模拟2<br>全球组合地图</span></div>
            <div class="subtitle-line">
                <span class="author-badge"><i class="fas fa-feather-alt"></i> <span data-i18n="author">作者：瑆泽</span></span>
                <span class="date-badge" id="globalDateBadge">
                    <i class="far fa-calendar-alt"></i> <span id="dateDisplay"></span>
                </span>
            </div>
        </div>
        <div class="nav-menu-container">
            <div class="nav-menu">
                <button class="nav-item active" data-nav="loadorder"><i class="fas fa-list-ol"></i> <span data-i18n="nav_loadorder">加载顺序</span><span id="navStatsBadge" class="nav-stats-badge"><i class="fas fa-cubes"></i> <strong>0</strong></span></button>
                <button class="nav-item" data-nav="install"><i class="fas fa-download"></i> <span data-i18n="nav_install">安装指南</span></button>
                <button class="nav-item" data-nav="optimize"><i class="fas fa-tachometer-alt"></i> <span data-i18n="nav_optimize">优化设置</span></button>
                <button class="nav-item" data-nav="othermods"><i class="fas fa-layer-group"></i> <span data-i18n="nav_othermods">其他模组加载顺序</span></button>
                <button class="nav-item" data-nav="changelog"><i class="fas fa-history"></i> <span data-i18n="nav_changelog">更新日志</span></button>
            </div>
            <div class="nav-menu-bottom">
                <button class="nav-item download-btn" data-nav="downloadsave"><i class="fas fa-cloud-download-alt"></i> <span data-i18n="nav_downloadsave">下载存档</span></button>
            </div>
        </div>
    </div>
    
    <!-- ===== 主内容 ===== -->
    <div class="content-main">
        <div class="content-header">
            <div class="content-header-left">
                <h2 id="panelTitle"><i class="fas fa-list-ol"></i> <span data-i18n="panel_loadorder">推荐加载顺序</span></h2>
                <!-- 版本下拉菜单 -->
                <span class="version-dropdown-wrapper" id="versionDropdownWrapper">
                    <button class="version-dropdown-btn" id="versionDropdownBtn">
                        <span id="currentVersionLabel">v1.59</span>
                        <i class="fas fa-chevron-down"></i>
                    </button>
                    <div class="version-dropdown-menu" id="versionDropdownMenu">
                        <button class="version-opt active-opt" data-version="1.59">1.59 <span class="opt-badge" data-i18n="badge_latest">最新</span></button>
                        <button class="version-opt" data-version="1.58">1.58</button>
                    </div>
                </span>
            </div>
            <div class="header-controls">
                <!-- 语言下拉菜单 -->
                <span class="lang-dropdown-wrapper" id="langDropdownWrapper">
                    <button class="lang-dropdown-btn" id="langDropdownBtn">
                        <span id="currentLangLabel">中文</span>
                        <i class="fas fa-chevron-down"></i>
                    </button>
                    <div class="lang-dropdown-menu" id="langDropdownMenu">
                        <button class="lang-opt active-opt" data-lang="zh">中文</button>
                        <button class="lang-opt" data-lang="en">EN</button>
                        <button class="lang-opt" data-lang="ru">RU</button>
                    </div>
                </span>
            </div>
        </div>
        <div id="dynamicContent" class="dynamic-area">
            <!-- 加载提示 -->
            <div class="no-mod-message" id="loadingIndicator">
                <i class="fas fa-spinner fa-pulse"></i>
                正在加载数据...
            </div>
        </div>
        <footer><span data-i18n="footer_tip">💡 推荐严格遵守「加载顺序」从上到下激活模组，道路连接补丁与修复包置于列表底部，确保全球地图稳定运行。</span><br><span data-i18n="footer_jump">✨ 点击「新增」或「移动」状态模组的名称，自动跳转并高亮其在完整列表中的位置（高亮持续3秒）</span></footer>
    </div>
</div>

<!-- ===== 返回顶部按钮 ===== -->
<button class="back-to-top" id="backToTop" aria-label="返回顶部">
    <i class="fas fa-chevron-up"></i>
</button>

<script>
    // ================================================================
    //  全局状态
    // ================================================================
    let currentLang = localStorage.getItem('ets2_lang') || 'zh';
    let currentFilter = 'all';
    let currentNav = 'loadorder';
    let currentVersion = localStorage.getItem('ets2_version') || '1.59';
    let pendingJumpModId = null;

    // ================================================================
    //  数据容器（将从外部文件加载）
    // ================================================================
    let VERSION_DATA = {};
    let i18n = {};

    // ================================================================
    //  下拉菜单管理（互斥展开）
    // ================================================================
    const langDropdownBtn = document.getElementById('langDropdownBtn');
    const langDropdownMenu = document.getElementById('langDropdownMenu');
    const versionDropdownBtn = document.getElementById('versionDropdownBtn');
    const versionDropdownMenu = document.getElementById('versionDropdownMenu');

    function closeAllDropdowns() {
        langDropdownMenu.classList.remove('open');
        langDropdownBtn.classList.remove('open');
        versionDropdownMenu.classList.remove('open');
        versionDropdownBtn.classList.remove('open');
    }

    function toggleDropdown(menu, btn) {
        const isOpen = menu.classList.contains('open');
        closeAllDropdowns();
        if (!isOpen) {
            menu.classList.add('open');
            btn.classList.add('open');
        }
    }

    // ================================================================
    //  工具函数（数据加载后可用）
    // ================================================================
    function t(key) {
        return i18n[currentLang]?.[key] || key;
    }

    function getCurrentMods() {
        return VERSION_DATA[currentVersion]?.mods || [];
    }

    function getCurrentSaveGroups() {
        return VERSION_DATA[currentVersion]?.saveGroups || [];
    }

    function getCurrentUpdateDate() {
        return VERSION_DATA[currentVersion]?.updateDate || '2026.06.18';
    }

    function getActiveModsCount(version) {
        const data = VERSION_DATA[version];
        if (!data) return 0;
        return data.mods.filter(mod => mod.status !== 'deleted').length;
    }

    function getModName(mod) { return mod.name; }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }

    function showToast(msg) {
        const toast = document.createElement('div');
        toast.innerText = msg;
        toast.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#0a1f2c;color:#ffdd99;padding:10px 20px;border-radius:40px;z-index:9999;font-size:0.8rem;border-left:4px solid #4cd964;box-shadow:0 4px 12px black;pointer-events:none;';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    function handleModDownload(modId, modName, downloadUrl) {
        if (!downloadUrl || downloadUrl.trim() === "") {
            alert(`“${modName}” 暂无可用下载链接。`);
            return;
        }
        window.open(downloadUrl, '_blank');
        showToast(`正在打开: ${modName}`);
    }

    // ================================================================
    //  更新显示
    // ================================================================
    function updateAllDates() {
        const dateDisplay = document.getElementById('dateDisplay');
        if (dateDisplay) {
            dateDisplay.textContent = t('update_date_label') + getCurrentUpdateDate();
        }
        // 更新版本下拉按钮文字
        const labelEl = document.getElementById('currentVersionLabel');
        if (labelEl) {
            labelEl.textContent = 'v' + currentVersion;
        }
        // 更新版本下拉菜单中的激活状态
        document.querySelectorAll('.version-dropdown-menu .version-opt').forEach(opt => {
            const v = opt.getAttribute('data-version');
            opt.classList.toggle('active-opt', v === currentVersion);
        });
        // 更新版本下拉菜单中的 "最新" 标签
        document.querySelectorAll('.version-dropdown-menu .opt-badge').forEach(el => {
            el.textContent = t('badge_latest');
        });
        // 更新语言下拉按钮文字
        const langLabel = document.getElementById('currentLangLabel');
        if (langLabel) {
            const langMap = { zh: '中文', en: 'EN', ru: 'RU' };
            langLabel.textContent = langMap[currentLang] || '中文';
        }
        // 更新语言下拉菜单激活状态
        document.querySelectorAll('.lang-dropdown-menu .lang-opt').forEach(opt => {
            const l = opt.getAttribute('data-lang');
            opt.classList.toggle('active-opt', l === currentLang);
        });
    }

    // ================================================================
    //  渲染函数
    // ================================================================
    function renderLoadOrder() {
        const mods = getCurrentMods();
        const filtered = currentFilter === 'all' ? mods : mods.filter(mod => mod.status === currentFilter);

        const counts = {
            all: mods.length,
            new: mods.filter(m => m.status === 'new').length,
            updated: mods.filter(m => m.status === 'updated').length,
            moved: mods.filter(m => m.status === 'moved').length,
            deleted: mods.filter(m => m.status === 'deleted').length
        };

        const filterConfigs = [
            { key: 'all', icon: 'fa-globe', label: 'filter_all' },
            { key: 'new', icon: 'fa-plus-circle', label: 'filter_new' },
            { key: 'updated', icon: 'fa-sync-alt', label: 'filter_updated' },
            { key: 'moved', icon: 'fa-arrows-alt', label: 'filter_moved' },
            { key: 'deleted', icon: 'fa-trash-alt', label: 'filter_deleted' }
        ];

        let filterButtonsHtml = filterConfigs.map(cfg => {
            const count = counts[cfg.key] || 0;
            const isActive = currentFilter === cfg.key;
            const isZero = count === 0 && cfg.key !== 'all';
            const zeroClass = isZero ? 'filter-zero' : '';
            const activeClass = isActive ? 'active' : '';
            return `<div class="filter-chip ${activeClass} ${zeroClass}" data-filter="${cfg.key}" ${isZero ? 'style="cursor:default;"' : ''}>
                <i class="fas ${cfg.icon}"></i> ${t(cfg.label)} <span class="filter-count">${count}</span>
            </div>`;
        }).join('');

        if (filtered.length === 0) {
            return `<div class="filter-bar"><div class="filter-label"><i class="fas fa-filter"></i> ${t('filter_all')}</div><div class="filter-buttons" id="filterButtonsContainer">${filterButtonsHtml}</div></div>
                <div class="no-mod-message"><i class="fas fa-filter"></i> ${t('no_mods')}</div>`;
        }

        let html = `<div class="filter-bar"><div class="filter-label"><i class="fas fa-filter"></i> ${t('filter_all')}</div><div class="filter-buttons" id="filterButtonsContainer">${filterButtonsHtml}</div></div><div class="mods-grid">`;
        let seqCounter = 0;
        filtered.forEach(mod => {
            const isDeleted = mod.status === 'deleted';
            let statusClass = '', statusLabel = '', statusIcon = '';
            const statusKey = mod.status === 'new' ? 'status_new' : mod.status === 'updated' ? 'status_updated' : mod.status === 'moved' ? 'status_moved' : mod.status === 'deleted' ? 'status_deleted' : 'status_normal';
            statusLabel = t(statusKey);
            switch (mod.status) {
                case 'new':
                    statusClass = 'status-new-large';
                    statusIcon = 'fa-plus-circle';
                    break;
                case 'updated':
                    statusClass = 'status-updated-large';
                    statusIcon = 'fa-sync-alt';
                    break;
                case 'moved':
                    statusClass = 'status-moved-large';
                    statusIcon = 'fa-arrows-alt';
                    break;
                case 'deleted':
                    statusClass = 'status-deleted-large';
                    statusIcon = 'fa-trash-alt';
                    break;
                default:
                    statusClass = 'status-normal-large';
                    statusIcon = 'fa-check-circle';
            }
            let seqDisplay = '',
                seqClass = 'mod-order';
            if (!isDeleted) { seqCounter++;
                seqDisplay = `#${seqCounter.toString().padStart(2, '0')}`; } else { seqDisplay = '—';
                seqClass += ' deleted-order'; }
            const isClickable = (mod.status === 'new' || mod.status === 'moved') && !isDeleted;
            const clickAttr = isClickable ? `style="cursor:pointer;" data-mod-id="${mod.id}" data-mod-status="${mod.status}"` : `style="cursor:default;" data-mod-id="${mod.id}"`;
            const hasValidUrl = mod.downloadUrl && mod.downloadUrl.trim() !== "";
            const downloadDisabled = isDeleted || !hasValidUrl;
            const downloadDataAttr = `data-mod-id="${mod.id}" data-mod-name="${escapeHtml(getModName(mod))}" data-download-url="${escapeHtml(mod.downloadUrl || '')}"`;
            const fileHtml = mod.fileName ?
                `<div class="mod-file"><i class="fas fa-file-archive"></i> ${t('file_label')}: ${escapeHtml(mod.fileName)}</div>` :
                '';
            html += `<div class="mod-card ${mod.status}" data-mod-id="${mod.id}"><div class="mod-card-inner">
                <div class="mod-status-area"><span class="status-badge-large ${statusClass}"><i class="fas ${statusIcon}"></i> ${statusLabel}</span></div>
                <div class="mod-content-area">
                    <div class="mod-header">
                        <span class="${seqClass}">${seqDisplay}</span>
                        <span class="mod-title" ${clickAttr}>${escapeHtml(getModName(mod))}</span>
                    </div>
                    ${fileHtml}
                </div>
                <div class="mod-action-area"><button class="download-button ${downloadDisabled ? 'disabled' : ''}" ${downloadDataAttr} ${downloadDisabled ? 'disabled' : ''}><i class="fas fa-download"></i> ${t('download_btn')}</button></div>
            </div></div>`;
        });
        html += `</div>`;
        return html;
    }

    function renderChangelog() {
        const mods = getCurrentMods();
        const newMods = mods.filter(m => m.status === 'new');
        const updatedMods = mods.filter(m => m.status === 'updated');
        const movedMods = mods.filter(m => m.status === 'moved');
        const deletedMods = mods.filter(m => m.status === 'deleted');
        const versionLabel = currentVersion;
        let html = `<div class="changelog-wrapper"><div class="changelog-version-header"><div class="changelog-version-title"><i class="fas fa-tag"></i> ${t('changelog_title').replace('{version}', versionLabel)}<span class="changelog-date">${getCurrentUpdateDate()}</span></div></div><div class="changelog-categories">`;

        if (newMods.length) {
            html += `<div class="changelog-category"><div class="category-header new collapsed" data-cat-toggle="new"><i class="fas fa-plus-circle"></i> ${t('changelog_new')} (${newMods.length})<i class="fas fa-chevron-down toggle-icon-cat"></i></div><div class="category-items collapsed" id="cat-new">`;
            newMods.forEach(m => {
                html += `<div class="changelog-mod-item">
                    <span class="changelog-mod-name">${escapeHtml(getModName(m))}</span>
                    ${m.fileName ? `<span class="changelog-mod-file"><i class="fas fa-file-archive"></i> ${escapeHtml(m.fileName)}</span>` : ''}
                </div>`;
            });
            html += `</div></div>`;
        }
        if (updatedMods.length) {
            html += `<div class="changelog-category"><div class="category-header updated collapsed" data-cat-toggle="updated"><i class="fas fa-sync-alt"></i> ${t('changelog_updated')} (${updatedMods.length})<i class="fas fa-chevron-down toggle-icon-cat"></i></div><div class="category-items collapsed" id="cat-updated">`;
            updatedMods.forEach(m => {
                html += `<div class="changelog-mod-item">
                    <span class="changelog-mod-name">${escapeHtml(getModName(m))}</span>
                    ${m.fileName ? `<span class="changelog-mod-file"><i class="fas fa-file-archive"></i> ${escapeHtml(m.fileName)}</span>` : ''}
                </div>`;
            });
            html += `</div></div>`;
        }
        if (movedMods.length) {
            html += `<div class="changelog-category"><div class="category-header moved collapsed" data-cat-toggle="moved"><i class="fas fa-arrows-alt"></i> ${t('changelog_moved')} (${movedMods.length})<i class="fas fa-chevron-down toggle-icon-cat"></i></div><div class="category-items collapsed" id="cat-moved">`;
            movedMods.forEach(m => {
                html += `<div class="changelog-mod-item">
                    <span class="changelog-mod-name">${escapeHtml(getModName(m))}</span>
                    ${m.fileName ? `<span class="changelog-mod-file"><i class="fas fa-file-archive"></i> ${escapeHtml(m.fileName)}</span>` : ''}
                </div>`;
            });
            html += `</div></div>`;
        }
        if (deletedMods.length) {
            html += `<div class="changelog-category"><div class="category-header deleted collapsed" data-cat-toggle="deleted"><i class="fas fa-trash-alt"></i> ${t('changelog_deleted')} (${deletedMods.length})<i class="fas fa-chevron-down toggle-icon-cat"></i></div><div class="category-items collapsed" id="cat-deleted">`;
            deletedMods.forEach(m => {
                html += `<div class="changelog-mod-item">
                    <span class="changelog-mod-name">${escapeHtml(getModName(m))}</span>
                    ${m.fileName ? `<span class="changelog-mod-file"><i class="fas fa-file-archive"></i> ${escapeHtml(m.fileName)}</span>` : ''}
                </div>`;
            });
            html += `</div></div>`;
        }
        html += `</div><div class="changelog-note"><i class="fas fa-info-circle"></i> ${t('changelog_note')}</div></div>`;
        return html;
    }

    function renderDownloadSave() {
        const groups = getCurrentSaveGroups();
        let html = `<div class="info-card download-card"><div style="text-align:center"><i class="fas fa-cloud-download-alt" style="font-size:3rem; color:#4cd964;"></i></div>
        <h2 style="text-align:center; color:#FFE9B6; margin-bottom:24px;">${t('download_save_title')} (v${currentVersion})</h2>`;
        groups.forEach((group, idx) => {
            const label = t(group.versionLabel);
            html += `<div class="save-group" data-group-idx="${idx}">
                <div class="save-group-header" data-group-toggle="${idx}">
                    <div class="save-group-title"><i class="fas ${group.icon}"></i> ${label}</div>
                    <i class="fas fa-chevron-down group-toggle-icon"></i>
                </div>
                <div class="save-subversions" id="saveSubs-${idx}">
                    ${group.subVersions.map(sub => `<button class="save-version-btn" data-url="${sub.url}" data-ver="${sub.verNum}"><i class="fas fa-download"></i> ${sub.verNum}</button>`).join('')}
                </div>
            </div>`;
        });
        html += `<div class="save-path"><i class="fas fa-folder-open"></i> ${t('download_save_path')}<br><code>${t('download_save_path_code')}</code></div>
        <div class="feature-highlight">${t('download_save_note')}</div></div>`;
        return html;
    }

    function renderInstall() {
        return `
        <div class="info-card">
            <div class="install-guide">
                <div class="install-step">
                    <div class="install-step-header">
                        <div class="install-step-number">1</div>
                        <div class="install-step-title">${t('install_step1_title')}</div>
                    </div>
                    <div class="install-step-content">${t('install_step1_content')}</div>
                </div>
                <div class="install-step">
                    <div class="install-step-header">
                        <div class="install-step-number">2</div>
                        <div class="install-step-title">${t('install_step2_title')}</div>
                    </div>
                    <div class="install-step-content">${t('install_step2_content')}</div>
                </div>
                <div class="install-step">
                    <div class="install-step-header">
                        <div class="install-step-number">3</div>
                        <div class="install-step-title">${t('install_step3_title')}</div>
                    </div>
                    <div class="install-step-content">${t('install_step3_content')}</div>
                </div>
                <div class="install-step">
                    <div class="install-step-header">
                        <div class="install-step-number">4</div>
                        <div class="install-step-title">${t('install_step4_title')}</div>
                    </div>
                    <div class="install-step-content">${t('install_step4_content')}</div>
                </div>
            </div>
        </div>
        `;
    }

    function renderOptimize() {
        return `
        <div class="info-card">
            <p style="color: #ffdf9e; font-weight: 600; margin-bottom: 8px;">${t('optimize_title')}</p>
            <div class="optimize-wrapper">
                <table class="optimize-table">
                    <thead><tr><th>${t('optimize_memory')}</th><th>${t('optimize_options')}</th></tr></thead>
                    <tbody>
                        <tr><td class="memory-cell">8GB</td><td class="options-cell">-nointro -unlimitedlog -mm_pool_size 4096 -mm_max_tmp_buffers_size 1000</td></tr>
                        <tr><td class="memory-cell">12GB</td><td class="options-cell">-nointro -unlimitedlog -mm_pool_size 6144 -mm_max_tmp_buffers_size 1000</td></tr>
                        <tr><td class="memory-cell">16GB <span class="recommend-badge">${t('optimize_recommend')}</span></td><td class="options-cell">-nointro -unlimitedlog -mm_pool_size 8192 -mm_max_tmp_buffers_size 1000</td></tr>
                        <tr><td class="memory-cell">32GB</td><td class="options-cell">-nointro -unlimitedlog -mm_pool_size 16384 -mm_max_tmp_buffers_size 1000</td></tr>
                        <tr><td class="memory-cell">64GB</td><td class="options-cell">-nointro -unlimitedlog -mm_pool_size 32768 -mm_max_tmp_buffers_size 1000</td></tr>
                    </tbody>
                </table>
            </div>
            <div class="optimize-note"><i class="fas fa-exclamation-triangle"></i> <strong>${t('optimize_note')}</strong></div>
        </div>
        `;
    }

    function renderOtherMods() {
        const items = [
            "othermods_background", "othermods_loading", "othermods_weather", "othermods_quality",
            "othermods_sound", "othermods_physics", "othermods_functional", "othermods_ui",
            "othermods_tuning", "othermods_interior", "othermods_traffic", "othermods_cargo",
            "othermods_paint", "othermods_trailer", "othermods_truck", "othermods_map"
        ];
        const translatedItems = items.map(key => t(key));
        let itemsHtml = translatedItems.map(item => {
            let cls = "mod-order-item";
            if (item === t("othermods_map")) cls += " highlight-item";
            return `<div class="${cls}"><i class="fas fa-cube item-icon"></i>${item}</div>`;
        }).join('');
        return `
        <div class="info-card" style="display: flex; justify-content: center; align-items: center; padding: 20px 20px; background: rgba(12, 28, 36, 0.4); border-left: 6px solid rgba(255, 200, 100, 0.4);">
            <div class="othermods-wrapper">
                <div class="othermods-list">
                    <div class="mod-order-item top-label"><i class="fas fa-arrow-up" style="margin-right: 8px;"></i> ${t('othermods_top')} <i class="fas fa-arrow-up" style="margin-left: 8px;"></i></div>
                    <div style="width: 60%; height: 1px; background: linear-gradient(90deg, transparent, rgba(255,200,100,0.15), transparent); margin: 4px 0;"></div>
                    ${itemsHtml}
                    <div style="width: 60%; height: 1px; background: linear-gradient(90deg, transparent, rgba(255,200,100,0.15), transparent); margin: 4px 0;"></div>
                    <div class="mod-order-item bottom-label"><i class="fas fa-arrow-down" style="margin-right: 8px;"></i> ${t('othermods_bottom')} <i class="fas fa-arrow-down" style="margin-left: 8px;"></i></div>
                </div>
            </div>
        </div>
        `;
    }

    const contentMap = {
        loadorder: { titleKey: 'panel_loadorder', render: renderLoadOrder },
        install: { titleKey: 'panel_install', render: renderInstall },
        optimize: { titleKey: 'panel_optimize', render: renderOptimize },
        othermods: { titleKey: 'panel_othermods', render: renderOtherMods },
        changelog: { titleKey: 'panel_changelog', render: renderChangelog },
        downloadsave: { titleKey: 'panel_downloadsave', render: renderDownloadSave }
    };

    const container = document.getElementById('dynamicContent');
    const titleEl = document.getElementById('panelTitle');
    const navStatsBadge = document.getElementById('navStatsBadge');

    function updateNavStatsBadge() {
        if (navStatsBadge) navStatsBadge.innerHTML = `<i class="fas fa-cubes"></i> <strong>${getActiveModsCount(currentVersion)}</strong>`;
    }

    function renderPage(navId) {
        const data = contentMap[navId];
        if (!data) return;
        titleEl.innerHTML = `<i class="fas ${navId === 'loadorder' ? 'fa-list-ol' : navId === 'install' ? 'fa-download' : navId === 'optimize' ? 'fa-tachometer-alt' : navId === 'othermods' ? 'fa-layer-group' : navId === 'changelog' ? 'fa-history' : 'fa-cloud-download-alt'}"></i> ${t(data.titleKey)}`;
        if (navId === 'loadorder') {
            currentFilter = 'all';
            container.innerHTML = data.render();
            bindFilterEvents();
            bindDownloadButtons();
            bindModTitleClick();
            document.querySelectorAll('.filter-chip').forEach(ch => {
                if (ch.getAttribute('data-filter') === 'all') ch.classList.add('active');
                else ch.classList.remove('active');
            });
        } else if (navId === 'changelog') {
            container.innerHTML = data.render();
            setTimeout(bindCategoryToggle, 30);
        } else if (navId === 'downloadsave') {
            container.innerHTML = data.render();
            setTimeout(bindSaveGroupEvents, 30);
        } else {
            container.innerHTML = data.render();
        }
        window.scrollTo({ top: 0, behavior: 'smooth' });
        updateNavStatsBadge();
        updateStaticTexts();
        updateAllDates();
    }

    function updateStaticTexts() {
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if (key) el.innerHTML = t(key);
        });
        updateAllDates();
    }

    // ================================================================
    //  事件绑定
    // ================================================================
    function bindFilterEvents() {
        document.querySelectorAll('.filter-chip').forEach(ch => {
            ch.removeEventListener('click', filterClickHandler);
            const filterKey = ch.getAttribute('data-filter');
            const mods = getCurrentMods();
            const count = filterKey === 'all' ? mods.length : mods.filter(m => m.status === filterKey).length;
            if (count === 0 && filterKey !== 'all') {
                ch.style.cursor = 'default';
                return;
            }
            ch.style.cursor = 'pointer';
            ch.addEventListener('click', filterClickHandler);
        });
    }

    function filterClickHandler(e) {
        const fv = this.getAttribute('data-filter');
        if (!fv || fv === currentFilter) return;
        const mods = getCurrentMods();
        const count = fv === 'all' ? mods.length : mods.filter(m => m.status === fv).length;
        if (count === 0 && fv !== 'all') {
            showToast('该分类下没有模组');
            return;
        }
        currentFilter = fv;
        if (currentNav === 'loadorder') {
            const newHtml = renderLoadOrder();
            container.innerHTML = newHtml;
            bindFilterEvents();
            bindDownloadButtons();
            bindModTitleClick();
        }
        document.querySelectorAll('.filter-chip').forEach(ch => {
            if (ch.getAttribute('data-filter') === currentFilter) ch.classList.add('active');
            else ch.classList.remove('active');
        });
    }

    function bindDownloadButtons() {
        document.querySelectorAll('.download-button:not(.disabled)').forEach(btn => {
            const nb = btn.cloneNode(true);
            btn.parentNode.replaceChild(nb, btn);
            nb.onclick = (e) => {
                e.preventDefault();
                const mid = parseInt(nb.getAttribute('data-mod-id'));
                const mname = nb.getAttribute('data-mod-name');
                let url = nb.getAttribute('data-download-url');
                if (!url) {
                    const md = getCurrentMods().find(m => m.id === mid);
                    if (md) url = md.downloadUrl;
                }
                handleModDownload(mid, mname, url);
            };
        });
    }

    function bindModTitleClick() {
        document.querySelectorAll('.mod-title').forEach(t => {
            t.removeEventListener('click', titleClickHandler);
            t.addEventListener('click', titleClickHandler);
        });
    }

    function titleClickHandler(e) {
        e.stopPropagation();
        const mid = parseInt(this.getAttribute('data-mod-id'));
        const status = this.getAttribute('data-mod-status');
        if (status === 'new' || status === 'moved') jumpToModInFullList(mid);
    }

    function jumpToModInFullList(modId) {
        pendingJumpModId = modId;
        if (currentFilter !== 'all') {
            currentFilter = 'all';
            refreshLoadOrderAndJump();
        } else {
            performScrollToMod(modId);
            pendingJumpModId = null;
        }
    }

    function refreshLoadOrderAndJump() {
        const newHtml = renderLoadOrder();
        container.innerHTML = newHtml;
        bindFilterEvents();
        bindDownloadButtons();
        bindModTitleClick();
        document.querySelectorAll('.filter-chip').forEach(ch => {
            if (ch.getAttribute('data-filter') === 'all') ch.classList.add('active');
            else ch.classList.remove('active');
        });
        setTimeout(() => {
            performScrollToMod(pendingJumpModId);
            pendingJumpModId = null;
        }, 150);
    }

    function performScrollToMod(modId) {
        const targetCard = document.querySelector(`.mod-card[data-mod-id="${modId}"]`);
        if (targetCard) {
            targetCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
            targetCard.classList.add('highlight-mod');
            setTimeout(() => targetCard.classList.remove('highlight-mod'), 3000);
        }
    }

    function bindCategoryToggle() {
        document.querySelectorAll('[data-cat-toggle]').forEach(toggle => {
            const newToggle = toggle.cloneNode(true);
            toggle.parentNode.replaceChild(newToggle, toggle);
            newToggle.onclick = () => {
                const key = newToggle.getAttribute('data-cat-toggle');
                const itemsContainer = document.getElementById(`cat-${key}`);
                if (itemsContainer) {
                    itemsContainer.classList.toggle('collapsed');
                    newToggle.classList.toggle('collapsed');
                }
            };
        });
    }

    function bindSaveGroupEvents() {
        const groups = getCurrentSaveGroups();
        groups.forEach((_, idx) => {
            const header = document.querySelector(`.save-group-header[data-group-toggle="${idx}"]`);
            const subsContainer = document.getElementById(`saveSubs-${idx}`);
            if (header && subsContainer) {
                const newHeader = header.cloneNode(true);
                header.parentNode.replaceChild(newHeader, header);
                newHeader.onclick = () => {
                    subsContainer.classList.toggle('collapsed');
                    newHeader.classList.toggle('collapsed');
                };
                subsContainer.classList.remove('collapsed');
            }
        });
        document.querySelectorAll('.save-version-btn').forEach(btn => {
            const newBtn = btn.cloneNode(true);
            btn.parentNode.replaceChild(newBtn, btn);
            newBtn.onclick = (e) => {
                e.stopPropagation();
                const url = newBtn.getAttribute('data-url');
                const ver = newBtn.getAttribute('data-ver');
                if (url) { window.open(url, '_blank');
                    showToast(`Download save: ${ver}`); } else alert(`Save ${ver} link unavailable`);
            };
        });
    }

    // ================================================================
    //  导航切换
    // ================================================================
    function setActiveNav(navId) {
        document.querySelectorAll('.nav-item').forEach(btn => btn.classList.toggle('active', btn.getAttribute('data-nav') === navId));
    }

    document.querySelectorAll('.nav-item').forEach(btn => {
        btn.addEventListener('click', () => {
            const target = btn.getAttribute('data-nav');
            if (target === currentNav) return;
            currentNav = target;
            renderPage(target);
            setActiveNav(target);
        });
    });

    // ================================================================
    //  语言下拉菜单事件（互斥）
    // ================================================================
    langDropdownBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        toggleDropdown(langDropdownMenu, langDropdownBtn);
    });

    document.querySelectorAll('.lang-dropdown-menu .lang-opt').forEach(opt => {
        opt.addEventListener('click', (e) => {
            e.stopPropagation();
            const lang = opt.getAttribute('data-lang');
            if (lang === currentLang) {
                closeAllDropdowns();
                return;
            }
            currentLang = lang;
            localStorage.setItem('ets2_lang', lang);
            renderPage(currentNav);
            updateNavStatsBadge();
            updateAllDates();
            closeAllDropdowns();
        });
    });

    // ================================================================
    //  版本下拉菜单事件（互斥）
    // ================================================================
    versionDropdownBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        toggleDropdown(versionDropdownMenu, versionDropdownBtn);
    });

    document.querySelectorAll('.version-dropdown-menu .version-opt').forEach(opt => {
        opt.addEventListener('click', (e) => {
            e.stopPropagation();
            const ver = opt.getAttribute('data-version');
            if (ver === currentVersion) {
                closeAllDropdowns();
                return;
            }
            currentVersion = ver;
            localStorage.setItem('ets2_version', ver);
            currentFilter = 'all';
            renderPage(currentNav);
            updateNavStatsBadge();
            updateAllDates();
            closeAllDropdowns();
        });
    });

    // 点击外部关闭所有下拉
    document.addEventListener('click', () => {
        closeAllDropdowns();
    });

    // ================================================================
    //  返回顶部
    // ================================================================
    const backToTopBtn = document.getElementById('backToTop');
    window.addEventListener('scroll', () => {
        if (window.scrollY > 300) backToTopBtn.classList.add('visible');
        else backToTopBtn.classList.remove('visible');
    });
    backToTopBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

    // ================================================================
    //  加载外部数据
    // ================================================================
    async function loadData() {
        const loadingIndicator = document.getElementById('loadingIndicator');
        try {
            const [modsRes, i18nRes] = await Promise.all([
                fetch('data/mods.json?t=' + Date.now()),
                fetch('data/i18n.json?t=' + Date.now())
            ]);

            if (!modsRes.ok || !i18nRes.ok) {
                throw new Error('数据文件加载失败 (HTTP ' + (modsRes.status || i18nRes.status) + ')');
            }

            VERSION_DATA = await modsRes.json();
            i18n = await i18nRes.json();

            // 隐藏加载提示
            if (loadingIndicator) loadingIndicator.style.display = 'none';

            // 初始化应用
            initApp();

        } catch (error) {
            console.error('加载数据失败:', error);
            if (loadingIndicator) {
                loadingIndicator.innerHTML = `
                    <i class="fas fa-exclamation-triangle"></i>
                    数据加载失败，请检查网络连接或刷新页面重试。
                    <br><small>${error.message}</small>
                    <br><br>
                    <button onclick="location.reload()" style="background:#e6a017;border:none;padding:10px 24px;border-radius:30px;color:#121f23;font-weight:700;cursor:pointer;font-family:inherit;">重新加载</button>
                `;
            }
        }
    }

    // ================================================================
    //  初始化应用（数据加载完成后调用）
    // ================================================================
    function initApp() {
        // 设置语言下拉菜单的激活状态
        document.querySelectorAll('.lang-dropdown-menu .lang-opt').forEach(opt => {
            const l = opt.getAttribute('data-lang');
            opt.classList.toggle('active-opt', l === currentLang);
        });

        // 设置版本下拉菜单的激活状态
        document.querySelectorAll('.version-dropdown-menu .version-opt').forEach(opt => {
            const v = opt.getAttribute('data-version');
            opt.classList.toggle('active-opt', v === currentVersion);
        });

        updateNavStatsBadge();
        currentFilter = 'all';
        renderPage('loadorder');
        setActiveNav('loadorder');
        updateStaticTexts();
        updateAllDates();

        // 移动端菜单
        if (window.innerWidth <= 700) {
            const btn = document.createElement('button');
            btn.innerHTML = '<i class="fas fa-bars"></i>';
            btn.style.cssText = 'position:fixed;top:16px;left:16px;z-index:101;background:#e6a017;border:none;padding:10px 14px;border-radius:30px;color:#121f23;font-size:1.2rem;cursor:pointer';
            btn.onclick = () => document.getElementById('sidebarNav').classList.toggle('mobile-open');
            document.body.appendChild(btn);
        }
    }

    // ================================================================
    //  启动：加载数据
    // ================================================================
    loadData();
</script>
</body>
</html>
